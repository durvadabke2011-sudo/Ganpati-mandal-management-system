<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sahakar Mandal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="min-vh-100 d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-lg border-0">
                        <div class="card-body p-5">
                            <!-- Header -->
                            <div class="text-center mb-4">
                                <i class="fas fa-hands-helping fa-3x text-primary mb-3"></i>
                                <h2 class="card-title fw-bold text-primary">Sahakar Mandal</h2>
                                <p class="text-muted">Sign In</p>
                            </div>

                            <!-- Login Form -->
                            <form id="login-form">
                                <!-- Email -->
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input 
                                        type="email" 
                                        class="form-control form-control-lg" 
                                        id="email" 
                                        name="email"
                                        placeholder="your@email.com"
                                        required
                                    >
                                </div>

                                <!-- Password -->
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <div class="input-group">
                                        <input 
                                            type="password" 
                                            class="form-control form-control-lg" 
                                            id="password" 
                                            name="password"
                                            placeholder="••••••••"
                                            required
                                        >
                                        <button class="btn btn-outline-secondary" type="button" id="toggle-password">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Remember Me -->
                                <div class="mb-3 form-check">
                                    <input 
                                        type="checkbox" 
                                        class="form-check-input" 
                                        id="remember" 
                                        name="remember"
                                    >
                                    <label class="form-check-label" for="remember">
                                        Remember me
                                    </label>
                                </div>

                                <!-- Submit Button -->
                                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
                                    <i class="fas fa-sign-in-alt"></i> Sign In
                                </button>
                            </form>

                            <!-- Divider -->
                            <div class="my-4">
                                <hr>
                                <p class="text-center text-muted small">OR</p>
                                <hr>
                            </div>

                            <!-- Social Login (Optional) -->
                            <div class="d-grid gap-2 mb-4">
                                <button class="btn btn-outline-secondary" type="button" id="guest-login">
                                    <i class="fas fa-user-circle"></i> Login as Guest
                                </button>
                            </div>

                            <!-- Sign Up Link -->
                            <p class="text-center text-muted mt-4">
                                Don't have an account? 
                                <a href="signup.html" class="text-primary fw-bold text-decoration-none">
                                    Sign Up
                                </a>
                            </p>

                            <!-- Forgot Password Link -->
                            <p class="text-center">
                                <a href="forgot-password.html" class="text-secondary text-decoration-none small">
                                    पासवर्ड भूल गए? / Forgot Password?
                                </a>
                            </p>
                        </div>
                    </div>

                    <!-- Demo Credentials Notice -->
                    <div class="alert alert-info mt-4" role="alert">
                        <i class="fas fa-info-circle"></i>
                        <strong>डेमो खाते / Demo Accounts:</strong>
                        <ul class="mb-0 mt-2">
                            <li><strong>Admin:</strong> admin@sahakar.com / password123</li>
                            <li><strong>Finance:</strong> finance@sahakar.com / password123</li>
                            <li><strong>Volunteer:</strong> volunteer@sahakar.com / password123</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="spinner-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
